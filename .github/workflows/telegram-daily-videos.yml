name: Daily Video Digest

on:
  schedule:
    # 8pm GMT+7 = 1pm UTC
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: pip install --quiet yt-dlp

      - name: Fetch videos and send to Telegram
        env:
          YOUTUBE_CHANNELS: ${{ secrets.YOUTUBE_CHANNELS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ -z "${YOUTUBE_CHANNELS:-}" || -z "${TELEGRAM_BOT_TOKEN:-}" || -z "${TELEGRAM_CHAT_ID:-}" ]]; then
            echo "::error::Missing required secrets (YOUTUBE_CHANNELS, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID)"
            exit 1
          fi

          API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
          DATE_HEADER=$(date -u -d '+7 hours' '+%d %b %Y — %H:%M')

          # Send header message
          curl -s -X POST "$API/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$(printf '📺 <b>Daily Video Digest</b>\n<i>%s (GMT+7)</i>' "$DATE_HEADER")" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')" > /dev/null

          CHANNEL_COUNT=$(echo "$YOUTUBE_CHANNELS" | jq length)
          TOTAL=0

          for i in $(seq 0 $((CHANNEL_COUNT - 1))); do
            NAME=$(echo "$YOUTUBE_CHANNELS" | jq -r ".[$i].name")
            URL=$(echo "$YOUTUBE_CHANNELS" | jq -r ".[$i].url")

            echo "Fetching: $NAME"
            VIDEOS=$(yt-dlp --playlist-end 5 -j --no-warnings "$URL" 2>/dev/null || true)

            if [[ -z "$VIDEOS" ]]; then
              echo "  No videos found"
              continue
            fi

            TEXT="<b>${NAME}</b>"
            BUTTONS="[]"
            COUNT=0

            while IFS= read -r line; do
              TITLE=$(echo "$line" | jq -r '.title // "Untitled"')
              VID=$(echo "$line" | jq -r '.id')
              DURATION=$(echo "$line" | jq -r '.duration // 0')
              VIEWS=$(echo "$line" | jq -r '.view_count // 0')

              # Format duration
              DUR_STR=""
              if [[ "$DURATION" != "0" && "$DURATION" != "null" ]]; then
                MINS=$((DURATION / 60))
                SECS=$((DURATION % 60))
                if [[ $MINS -ge 60 ]]; then
                  HRS=$((MINS / 60))
                  MINS=$((MINS % 60))
                  DUR_STR=$(printf "%d:%02d:%02d" "$HRS" "$MINS" "$SECS")
                else
                  DUR_STR=$(printf "%d:%02d" "$MINS" "$SECS")
                fi
              fi

              # Format views
              VIEW_STR=""
              if [[ "$VIEWS" != "0" && "$VIEWS" != "null" ]]; then
                if [[ $VIEWS -ge 1000000 ]]; then
                  VIEW_STR="$(echo "scale=1; $VIEWS/1000000" | bc)M"
                elif [[ $VIEWS -ge 1000 ]]; then
                  VIEW_STR="$(echo "scale=1; $VIEWS/1000" | bc)K"
                else
                  VIEW_STR="${VIEWS}"
                fi
              fi

              META=""
              [[ -n "$DUR_STR" ]] && META="$DUR_STR"
              [[ -n "$VIEW_STR" ]] && META="${META:+$META · }${VIEW_STR} views"

              COUNT=$((COUNT + 1))
              TEXT+="$(printf '\n\n%d. %s' "$COUNT" "$TITLE")"
              [[ -n "$META" ]] && TEXT+="$(printf '\n   <i>%s</i>' "$META")"

              # Truncate button label to 60 chars
              BTN_LABEL="$TITLE"
              if [[ ${#BTN_LABEL} -gt 60 ]]; then
                BTN_LABEL="${BTN_LABEL:0:57}..."
              fi

              BUTTONS=$(echo "$BUTTONS" | jq \
                --arg text "📝 $BTN_LABEL" \
                --arg data "$VID" \
                '. + [[{"text": $text, "callback_data": $data}]]')

            done <<< "$VIDEOS"

            if [[ $COUNT -gt 0 ]]; then
              PAYLOAD=$(jq -n \
                --arg chat_id "$TELEGRAM_CHAT_ID" \
                --arg text "$TEXT" \
                --argjson keyboard "$BUTTONS" \
                '{
                  chat_id: $chat_id,
                  text: $text,
                  parse_mode: "HTML",
                  disable_web_page_preview: true,
                  reply_markup: { inline_keyboard: $keyboard }
                }')

              RESPONSE=$(curl -s -X POST "$API/sendMessage" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")

              OK=$(echo "$RESPONSE" | jq -r '.ok')
              if [[ "$OK" != "true" ]]; then
                echo "::warning::Failed to send message for $NAME: $(echo "$RESPONSE" | jq -r '.description // "unknown error"')"
              else
                echo "  Sent $COUNT videos for $NAME"
              fi

              TOTAL=$((TOTAL + COUNT))
            fi
          done

          echo "Done — sent $TOTAL video(s) total"
