name: Daily Video Digest

on:
  schedule:
    # 8pm GMT+7 = 1pm UTC
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch videos and send to Telegram
        env:
          YOUTUBE_CHANNELS: ${{ secrets.YOUTUBE_CHANNELS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, urllib.request, xml.etree.ElementTree as ET
          from datetime import datetime, timezone, timedelta

          channels = json.loads(os.environ.get("YOUTUBE_CHANNELS", "[]"))
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")

          if not channels or not token or not chat_id:
              print("::error::Missing required secrets")
              sys.exit(1)

          API = f"https://api.telegram.org/bot{token}"
          gmt7 = timezone(timedelta(hours=7))
          date_header = datetime.now(gmt7).strftime("%d %b %Y — %H:%M")

          def tg(method, payload):
              data = json.dumps(payload).encode()
              req = urllib.request.Request(
                  f"{API}/{method}",
                  data=data,
                  headers={"Content-Type": "application/json"},
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read())
              except Exception as e:
                  print(f"  Telegram API error: {e}")
                  return {"ok": False}

          # Send header
          tg("sendMessage", {
              "chat_id": chat_id,
              "text": f"📺 <b>Daily Video Digest</b>\n<i>{date_header} (GMT+7)</i>",
              "parse_mode": "HTML",
          })

          NS = {
              "atom": "http://www.w3.org/2005/Atom",
              "yt": "http://www.youtube.com/xml/schemas/2015",
              "media": "http://search.yahoo.com/mrss/",
          }
          total = 0

          for ch in channels:
              name = ch["name"]
              channel_id = ch.get("channelId", "")
              if not channel_id:
                  print(f"  Skipping {name}: no channelId")
                  continue

              print(f"Fetching: {name}")
              feed_url = f"https://www.youtube.com/feeds/videos.xml?channel_id={channel_id}"

              try:
                  req = urllib.request.Request(feed_url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      xml_data = resp.read().decode()
              except Exception as e:
                  print(f"  RSS fetch failed: {e}")
                  continue

              root = ET.fromstring(xml_data)
              entries = root.findall("atom:entry", NS)[:5]

              if not entries:
                  print("  No videos in RSS feed")
                  continue

              tg("sendMessage", {
                  "chat_id": chat_id,
                  "text": f"<b>{name}</b>",
                  "parse_mode": "HTML",
              })

              count = 0
              for entry in entries:
                  vid = entry.find("yt:videoId", NS).text
                  title = entry.find("atom:title", NS).text or "Untitled"
                  thumb = f"https://img.youtube.com/vi/{vid}/hqdefault.jpg"

                  views_el = entry.find(".//media:statistics", NS)
                  views = int(views_el.get("views", "0")) if views_el is not None else 0

                  if views >= 1_000_000:
                      view_str = f"{views/1_000_000:.1f}M views"
                  elif views >= 1_000:
                      view_str = f"{views/1_000:.1f}K views"
                  elif views > 0:
                      view_str = f"{views} views"
                  else:
                      view_str = ""

                  pub_el = entry.find("atom:published", NS)
                  pub_str = ""
                  if pub_el is not None and pub_el.text:
                      try:
                          pub_dt = datetime.fromisoformat(pub_el.text.replace("Z", "+00:00"))
                          pub_str = pub_dt.astimezone(gmt7).strftime("%d/%m")
                      except Exception:
                          pass

                  meta_parts = [p for p in [pub_str, view_str] if p]
                  meta = " · ".join(meta_parts)

                  caption = f"<b>{title}</b>"
                  if meta:
                      caption += f"\n<i>{meta}</i>"

                  btn_label = "📝 Summarize"
                  result = tg("sendPhoto", {
                      "chat_id": chat_id,
                      "photo": thumb,
                      "caption": caption,
                      "parse_mode": "HTML",
                      "reply_markup": {"inline_keyboard": [[
                          {"text": btn_label, "callback_data": vid},
                          {"text": "▶️ Watch", "url": f"https://www.youtube.com/watch?v={vid}"},
                      ]]},
                  })
                  if result.get("ok"):
                      count += 1
                  else:
                      print(f"  Failed to send video {vid}: {result}")

              if count > 0:
                  print(f"  Sent {count} videos")
                  total += count

          print(f"Done — sent {total} video(s) total")
          PYEOF
