name: Daily Video Digest

on:
  schedule:
    # 8pm GMT+7 = 1pm UTC
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: pip install --quiet yt-dlp

      - name: Fetch recent videos and notify Telegram
        env:
          YOUTUBE_CHANNELS: ${{ secrets.YOUTUBE_CHANNELS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ -z "${YOUTUBE_CHANNELS:-}" || -z "${TELEGRAM_BOT_TOKEN:-}" || -z "${TELEGRAM_CHAT_ID:-}" ]]; then
            echo "::error::Missing required secrets (YOUTUBE_CHANNELS, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID)"
            exit 1
          fi

          YESTERDAY=$(date -u -d "yesterday" +%Y%m%d)
          TODAY=$(date -u +%Y%m%d)
          echo "Fetching videos uploaded since $YESTERDAY"

          MESSAGE="<b>đź“ş Daily Video Digest</b>"$'\n'"<i>$(date -u -d '+7 hours' '+%d %b %Y â€” %H:%M') (GMT+7)</i>"$'\n'
          TOTAL=0

          CHANNEL_COUNT=$(echo "$YOUTUBE_CHANNELS" | jq length)
          for i in $(seq 0 $((CHANNEL_COUNT - 1))); do
            NAME=$(echo "$YOUTUBE_CHANNELS" | jq -r ".[$i].name")
            URL=$(echo "$YOUTUBE_CHANNELS" | jq -r ".[$i].url")

            echo "Fetching: $NAME"
            VIDEOS=$(yt-dlp --dateafter "$YESTERDAY" --playlist-end 15 -j --no-warnings "$URL" 2>/dev/null || true)

            if [[ -z "$VIDEOS" ]]; then
              continue
            fi

            CHANNEL_MSG=""
            COUNT=0
            while IFS= read -r line; do
              TITLE=$(echo "$line" | jq -r '.title // "Untitled"')
              VID=$(echo "$line" | jq -r '.id')
              DURATION=$(echo "$line" | jq -r '.duration // 0')
              VIEWS=$(echo "$line" | jq -r '.view_count // 0')
              UPLOAD=$(echo "$line" | jq -r '.upload_date // ""')

              # Format duration as HH:MM:SS or MM:SS
              if [[ "$DURATION" != "0" && "$DURATION" != "null" ]]; then
                MINS=$((DURATION / 60))
                SECS=$((DURATION % 60))
                if [[ $MINS -ge 60 ]]; then
                  HRS=$((MINS / 60))
                  MINS=$((MINS % 60))
                  DUR_STR=$(printf "%d:%02d:%02d" "$HRS" "$MINS" "$SECS")
                else
                  DUR_STR=$(printf "%d:%02d" "$MINS" "$SECS")
                fi
              else
                DUR_STR=""
              fi

              # Format views
              if [[ "$VIEWS" != "0" && "$VIEWS" != "null" ]]; then
                if [[ $VIEWS -ge 1000000 ]]; then
                  VIEW_STR="$(echo "scale=1; $VIEWS/1000000" | bc)M views"
                elif [[ $VIEWS -ge 1000 ]]; then
                  VIEW_STR="$(echo "scale=1; $VIEWS/1000" | bc)K views"
                else
                  VIEW_STR="${VIEWS} views"
                fi
              else
                VIEW_STR=""
              fi

              META=""
              [[ -n "$DUR_STR" ]] && META="$DUR_STR"
              [[ -n "$VIEW_STR" ]] && META="${META:+$META Â· }$VIEW_STR"

              CHANNEL_MSG+=$'\n'"  â€˘ <a href=\"https://www.youtube.com/watch?v=${VID}\">${TITLE}</a>"
              [[ -n "$META" ]] && CHANNEL_MSG+=$'\n'"    <i>${META}</i>"
              COUNT=$((COUNT + 1))
            done <<< "$VIDEOS"

            if [[ $COUNT -gt 0 ]]; then
              MESSAGE+=$'\n'"<b>${NAME}</b> (${COUNT} new)"
              MESSAGE+="$CHANNEL_MSG"$'\n'
              TOTAL=$((TOTAL + COUNT))
            fi
          done

          if [[ $TOTAL -eq 0 ]]; then
            MESSAGE+=$'\n'"No new videos since yesterday."
          else
            MESSAGE+=$'\n'"<b>Total: ${TOTAL} new video(s)</b>"
          fi

          # Send to Telegram
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=$MESSAGE")

          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [[ "$OK" != "true" ]]; then
            echo "::error::Telegram API error: $RESPONSE"
            exit 1
          fi

          echo "Sent digest with $TOTAL video(s) to Telegram"
